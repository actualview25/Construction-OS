    <!-- ===== تصحيح المسارات المتقدم ===== -->
    <script>
        (function fixAllPaths() {
            console.log('🔧 بدء تشخيص وتصحيح المسارات...');
            
            // 1. تصحيح اسم المستودع (Constraction → Construction)
            const wrongBase = 'Constraction-OS/';
            const correctBase = 'Construction-OS/';
            
            // 2. تصحيح حالة الأحرف (modules → Modules)
            const wrongModules = '/Construction-OS/modules/';
            const correctModules = '/Construction-OS/Modules/';
            
            // اعتراض جميع طلبات fetch
            const originalFetch = window.fetch;
            window.fetch = function(url, options) {
                if (typeof url === 'string') {
                    let fixedUrl = url;
                    
                    // تصحيح اسم المستودع
                    if (fixedUrl.includes(wrongBase)) {
                        fixedUrl = fixedUrl.replace(wrongBase, correctBase);
                        console.log('📁 تصحيح المستودع:', fixedUrl);
                    }
                    
                    // تصحيح modules → Modules (الأهم!)
                    if (fixedUrl.includes(wrongModules)) {
                        fixedUrl = fixedUrl.replace(wrongModules, correctModules);
                        console.log('📁 تصحيح Modules:', fixedUrl);
                    }
                    
                    if (fixedUrl !== url) {
                        return originalFetch.call(this, fixedUrl, options);
                    }
                }
                return originalFetch.call(this, url, options);
            };
            
            // اعتراض import الديناميكي
            const originalImport = window.import;
            if (originalImport) {
                window.import = function(url) {
                    if (typeof url === 'string') {
                        let fixedUrl = url;
                        if (fixedUrl.includes(wrongBase)) {
                            fixedUrl = fixedUrl.replace(wrongBase, correctBase);
                        }
                        if (fixedUrl.includes(wrongModules)) {
                            fixedUrl = fixedUrl.replace(wrongModules, correctModules);
                        }
                        return originalImport.call(this, fixedUrl);
                    }
                    return originalImport.call(this, url);
                };
            }
            
            // إخفاء أخطاء 404 غير المهمة
            window.addEventListener('error', function(e) {
                // أخطاء الملفات غير الأساسية
                const nonCriticalPaths = [
                    '/player/',
                    '/floors/',
                    '/clash/',
                    '/global/GlobalElectrical.js',
                    '/global/GlobalPlumbing.js',
                    '/global/GlobalHVAC.js'
                ];
                
                if (e.target && e.target.src) {
                    if (nonCriticalPaths.some(path => e.target.src.includes(path))) {
                        e.preventDefault();
                        e.stopPropagation();
                        console.warn('⚠️ تم تجاهل ملف غير أساسي:', e.target.src);
                        return false;
                    }
                }
            }, true);
            
            // تشخيص المسارات
            window.checkPath = async function(path) {
                try {
                    const res = await fetch(path);
                    console.log(`🔍 ${path}: ${res.status} ${res.statusText}`);
                    return res.ok;
                } catch (e) {
                    console.error(`❌ ${path}:`, e.message);
                    return false;
                }
            };
            
            console.log('✅ نظام تصحيح المسارات جاهز');
            console.log('📝 استخدم window.checkPath("/path/to/file.js") للتشخيص');
        })();
    </script>
    
    <!-- ربط ملف CSS -->
    <link rel="stylesheet" href="style.css">

    <style>
        * {

        #loading {

<body>
    <!-- شاشة التحميل -->
    <div id="loading">
        <div class="loader">
            <h1>🏗️ ACTUAL CONSTRUCTION OS</h1>
            <p>جاري تحميل المنصة المتكاملة...</p>
            <p style="font-size: 12px; margin-top: 20px;">الإصدار 3.0 | منصة إدارة المشاريع الهندسية</p>
        </div>

    <!-- حاوية المشهد ثلاثي الأبعاد -->
    <div id="container"></div>
    
    <!-- شريط الحالة -->
    <div class="status-bar" id="statusBar">
        ⏳ جاري التحميل...
    </div>
    
    <script>
        // تحديث شريط الحالة
        window.updateStatus = function(message, type = 'info') {
            const bar = document.getElementById('statusBar');
            if (bar) {
                const icons = {
                    info: 'ℹ️',
                    success: '✅',
                    warning: '⚠️',
                    error: '❌'
                };
                bar.innerHTML = `${icons[type] || 'ℹ️'} ${message}`;
            }
        };
        
        // إخفاء شاشة التحميل بعد تحميل الصفحة
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading').style.display = 'none';
                }, 500);
            }, 2000);
        });
        
        // تشخيص سريع بعد 3 ثوان
        setTimeout(() => {
            console.log('🔍 تشخيص سريع للمسارات:');
            checkPath('/Construction-OS/Modules/Architecture/Wall.js');
            checkPath('/Construction-OS/Modules/Architecture/Door.js');
        }, 3000);
    </script>
    
    <!-- استيراد الملف الرئيسي -->
    <script type="module" src="./main.js"></script>
<!-- واجهة المستخدم الأساسية -->
<div class="main-toolbar" id="mainToolbar">
    <button class="toolbar-btn" onclick="createWall()" title="إضافة جدار">🧱</button>
    <button class="toolbar-btn" onclick="createDoor()" title="إضافة باب">🚪</button>
    <button class="toolbar-btn" onclick="createWindow()" title="إضافة شباك">🪟</button>
    <button class="toolbar-btn" onclick="createColumn()" title="إضافة عمود">🏛️</button>
    <button class="toolbar-btn" onclick="createBeam()" title="إضافة كمرة">📐</button>
    <button class="toolbar-btn" onclick="showBOQ()" title="جدول الكميات">📊</button>
    <button class="toolbar-btn" onclick="resetCamera()" title="إعادة ضبط الكاميرا">🎯</button>
</div>

<!-- لوحة الخصائص -->
<div class="properties-panel" id="propertiesPanel">
    <h3>📋 الخصائص</h3>

        <p>اختر عنصراً لعرض خصائصه</p>

<script>
// ===== دوال واجهة المستخدم =====
window.createWall = async function() {
    try {
        // استيراد كلاس Wall
        const module = await import('/Construction-OS/Modules/Architecture/Wall.js');
        const Wall = module.Wall;
        
        // إنشاء جدار عشوائي
        const wall = new Wall({
            start: { x: -3, y: 0, z: 0 },
            end: { x: 3, y: 0, z: 0 },
            height: 3,
            thickness: 0.2
        });
        
        const mesh = wall.createMesh();
        window.app.scene.add(mesh);
        
        // حفظ معلومات الجدار
        mesh.userData = { type: 'wall', data: wall };
        
        updateStatus('✅ تم إضافة جدار', 'success');
    } catch (e) {
        console.error(e);
        updateStatus('❌ فشل إضافة جدار', 'error');
    }
};

window.createDoor = async function() {
    try {
        const module = await import('/Construction-OS/Modules/Architecture/Door.js');
        const Door = module.Door;
        
        const door = new Door({
            width: 0.9,
            height: 2.1,
            position: { x: 0, y: 0, z: 2 }
        });
        
        const mesh = door.createMesh();
        window.app.scene.add(mesh);
        
        mesh.userData = { type: 'door', data: door };
        updateStatus('✅ تم إضافة باب', 'success');
    } catch (e) {
        updateStatus('❌ فشل إضافة باب', 'error');
    }
};

window.createColumn = async function() {
    try {
        const module = await import('/Construction-OS/Modules/Concrete/Column.js');
        const Column = module.Column;
        
        const column = new Column({
            height: 4,
            width: 0.4,
            depth: 0.4,
            position: { x: 2, y: 0, z: 2 }
        });
        
        const mesh = column.createMesh();
        window.app.scene.add(mesh);
        
        mesh.userData = { type: 'column', data: column };
        updateStatus('✅ تم إضافة عمود', 'success');
    } catch (e) {
        updateStatus('❌ فشل إضافة عمود', 'error');
    }
};

window.showBOQ = function() {
    // حساب الكميات للعناصر في المشهد
    let items = [];
    window.app.scene.children.forEach(child => {
        if (child.userData && child.userData.data) {
            items.push(child.userData.data);
        }
    });
    
    let report = '📊 جدول الكميات\n';
    report += '══════════════════\n';
    
    items.forEach((item, i) => {
        if (item.getBOQ) {
            const boq = item.getBOQ();
            report += `\n${i+1}. ${boq.نوع || 'عنصر'}:\n`;
            Object.keys(boq).forEach(key => {
                report += `   ${key}: ${boq[key]}\n`;
            });
        }
    });
    
    report += '\n══════════════════';
    alert(report);
};

window.resetCamera = function() {
    if (window.app) {
        window.app.camera.position.set(5, 5, 10);
        window.app.camera.lookAt(0, 0, 0);
        window.app.controls.target.set(0, 0, 0);
        window.app.controls.update();
        updateStatus('🎯 تم إعادة ضبط الكاميرا', 'info');
    }
};

window.updateStatus = function(message, type = 'info') {
    const bar = document.getElementById('statusBar');
    if (bar) {
        const icons = { info: 'ℹ️', success: '✅', error: '❌', warning: '⚠️' };
        bar.innerHTML = `${icons[type]} ${message}`;
        
        // إخفاء الرسالة بعد 3 ثوان
        setTimeout(() => {
            bar.innerHTML = '✅ النظام جاهز';
        }, 3000);
    }
};

// تفعيل النقر على العناصر
window.setupSelection = function() {
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    
    window.app.renderer.domElement.addEventListener('click', (event) => {
        // حساب موقع النقر
        mouse.x = (event.clientX / window.app.renderer.domElement.clientWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.app.renderer.domElement.clientHeight) * 2 + 1;
        
        raycaster.setFromCamera(mouse, window.app.camera);
        
        // فحص العناصر
        const intersects = raycaster.intersectObjects(window.app.scene.children);
        
        if (intersects.length > 0) {
            const selected = intersects[0].object;
            
            if (selected.userData && selected.userData.data) {
                // عرض الخصائص
                const data = selected.userData.data;
                const boq = data.getBOQ ? data.getBOQ() : {};
                
                let html = '<table style="width:100%">';
                Object.keys(boq).forEach(key => {
                    html += `<tr><td><strong>${key}</strong></td><td>${boq[key]}</td></tr>`;
                });
                html += '</table>';
                
                document.getElementById('propertiesContent').innerHTML = html;
            }
        }
    });
};

// تفعيل بعد تحميل التطبيق
setTimeout(() => {
    if (window.app) {
        window.setupSelection();
        console.log('✅ واجهة المستخدم جاهزة');
    }
}, 5000);
</script>
