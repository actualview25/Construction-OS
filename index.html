<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACTUAL CONSTRUCTION OS - منصة إدارة المشاريع الهندسية</title>
    
    <!-- ===== تصحيح المسارات ===== -->
    <script>
        // تصحيح المسار الأساسي (Constraction-OS → Construction-OS)
        (function fixBasePath() {
            const wrongBase = 'Constraction-OS/';
            const correctBase = 'Construction-OS/';
            
            // اعتراض جميع طلبات الملفات
            const originalFetch = window.fetch;
            window.fetch = function(url, options) {
                if (typeof url === 'string' && url.includes(wrongBase)) {
                    url = url.replace(wrongBase, correctBase);
                    console.log('✅ تم تصحيح المسار:', url);
                }
                return originalFetch.call(this, url, options);
            };
            
            // اعتراض import
            const originalImport = window.import;
            if (originalImport) {
                window.import = function(url) {
                    if (typeof url === 'string' && url.includes(wrongBase)) {
                        url = url.replace(wrongBase, correctBase);
                    }
                    return originalImport.call(this, url);
                };
            }
            
            // إخفاء أخطاء الملفات المفقودة مؤقتاً
            window.addEventListener('error', function(e) {
                if (e.message && e.message.includes('Loading chunk') || 
                    (e.target && e.target.src && e.target.src.includes('Constraction-OS'))) {
                    e.preventDefault();
                    e.stopPropagation();
                    return false;
                }
                
                // إخفاء أخطاء 404 للملفات غير المهمة
                if (e.target && e.target.src && (
                    e.target.src.includes('/player/') ||
                    e.target.src.includes('/floors/') ||
                    e.target.src.includes('/clash/')
                )) {
                    e.preventDefault();
                    e.stopPropagation();
                    console.warn('⚠️ تم تجاهل ملف غير أساسي:', e.target.src);
                    return false;
                }
            }, true);
            
            console.log('🌟 نظام تصحيح المسارات نشط');
        })();
    </script>
    
    <!-- ربط ملف CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- أيقونة الموقع -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏗️</text></svg>">
    
    <!-- وصف الموقع لمحركات البحث -->
    <meta name="description" content="منصة متكاملة لتصميم وإدارة المشاريع الهندسية - ACTUAL CONSTRUCTION OS">
    <meta name="keywords" content="هندسة, بناء, مشاريع, خرسانة, حديد, تشطيبات">
    <meta name="author" content="مهندس سوداني">
    
    <!-- دعم اللغة العربية -->
    <meta name="language" content="ar">
    
    <!-- ألوان الواجهة للمتصفحات الحديثة -->
    <meta name="theme-color" content="#111122">
    
    <!-- إعدادات Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    
    <style>
        /* أنماط احتياطية أثناء تحميل CSS */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111122;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s;
        }
        
        .loader {
            text-align: center;
            color: white;
        }
        
        .loader h1 {
            color: #88aaff;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        .loader p {
            color: #4a6c8f;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<script>
    (function fixPaths() {
        console.log('🔧 بدء تصحيح المسارات...');
        
        // اعتراض جميع طلبات الملفات
        const originalFetch = window.fetch;
        window.fetch = function(url, options) {
            if (typeof url === 'string') {
                // قائمة بالمسارات الخاطئة المحتملة
                const fixes = {
                    '/modules/Architecture/': '/modules/architecture/',
                    '/modules/Concrete/': '/modules/concrete/',
                    '/modules/Earthworks/': '/modules/earthworks/',
                    '/modules/MEP/': '/modules/mep/',
                    '/modules/BOQ/': '/modules/boq/'
                };
                
                let fixedUrl = url;
                for (let [wrong, correct] of Object.entries(fixes)) {
                    if (url.includes(wrong)) {
                        fixedUrl = url.replace(wrong, correct);
                        console.log('✅ تم تصحيح المسار:', fixedUrl);
                        break;
                    }
                }
                return originalFetch.call(this, fixedUrl, options);
            }
            return originalFetch.call(this, url, options);
        };
        
        console.log('✅ نظام تصحيح المسارات جاهز');
    })();
</script>
    
<body>
    <!-- شاشة التحميل -->
    <div id="loading">
        <div class="loader">
            <h1>🏗️ ACTUAL CONSTRUCTION OS</h1>
            <p>جاري تحميل المنصة المتكاملة...</p>
            <p style="font-size: 12px; margin-top: 20px;">الإصدار 1.0 | منصة إدارة المشاريع الهندسية</p>
        </div>
    </div>
    
    <!-- حاوية المشهد ثلاثي الأبعاد -->
    <div id="container"></div>
    
    <!-- شريط الحالة -->
    <div class="status-bar" id="statusBar">
        ✅ النظام جاهز
    </div>
    
    <!-- إخفاء شريط التحميل بعد تحميل الصفحة -->
    <script>
        // إخفاء شاشة التحميل بعد 2 ثانية أو عند تحميل الصفحة
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading').style.display = 'none';
                }, 500);
            }, 1500);
        });
    </script>
    
    <!-- استيراد الملف الرئيسي -->
    <script type="module" src="./main.js"></script>
</body>
</html>
